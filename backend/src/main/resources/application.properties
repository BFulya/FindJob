# Server Configuration
server.port=8080
spring.application.name=FindJob

# Database Configuration (H2)
spring.datasource.url=jdbc:h2:mem:findjobdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=FindJobSecretKeyForJWTTokenGeneration2024
jwt.expiration=86400000

# File Storage
file.storage.path=C:/Users/BFK/Desktop/FindJob/user_data

# Logging
logging.level.com.findjob=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
